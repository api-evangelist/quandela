aid: quandela
name: Quandela
description: >-
  Quandela is a Paris-region (Massy, France) photonic quantum computing
  company building modular, scalable, and energy-efficient quantum systems
  driven by deterministic single-photon sources. Its hardware lineup includes
  Ascella (its first deployed cloud-accessible system), Belenos (a
  12-qubit second-generation machine), Canopus (its latest state-of-the-art
  system), and Mosaiq (its flagship prototyping platform), alongside
  Prometheus single-photon sources and the Entropy quantum random number
  generator. Quandela develops Perceval, an open-source Python framework for
  programming photonic quantum computers, distributed via PyPI as
  perceval-quandela, and operates a cloud platform at cloud.quandela.com
  where users authenticate with a token and submit jobs to simulators and
  QPUs (e.g. "sim:altair", "qpu:altair") through Perceval's RemoteProcessor.
  The company also runs a Quantum Acceleration Program for enterprise
  pilots in cybersecurity, pharma, chemistry, logistics, finance, energy,
  and aerospace. There is no public REST/HTTP OpenAPI specification — the
  cloud surface is abstracted entirely behind the Perceval Python SDK and
  its companion perceval-interop bridges to Qiskit, QuTiP, cQASM, and
  myQLM.
